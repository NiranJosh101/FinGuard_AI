syntax = "proto3";

package finguard.intent;

import "ingress.proto";

enum ActionType {
  ACTION_UNSPECIFIED = 0;
  CHECK_BALANCE = 1;
  TRANSFER = 2;
  BUY_CRYPTO = 3;
  UNKNOWN_ACTION = 4;
}

enum TargetNetwork {
  NETWORK_UNSPECIFIED = 0;
  FIAT_BANK_ACH = 1;
  CRYPTO_BLOCKCHAIN = 2;
  INTERNAL_WALLET = 3;
}

enum UrgencyLevel {
  URGENCY_UNSPECIFIED = 0;
  STANDARD = 1;
  HIGH_URGENCY = 2;
}

enum TransactionCategory {
  CATEGORY_UNSPECIFIED = 0;
  PEER_TO_PEER = 1;
  BILL_PAYMENT = 2;
  SPECULATIVE_ASSET = 3;
}

message IntentPayload {
  ActionType action = 1;
  double amount = 2;
  string currency = 3;

  string recipient_alias = 4;

  TargetNetwork target_network = 5;
  TransactionCategory category = 6;
  UrgencyLevel urgency = 7;

  bool recipient_is_explicit = 8;

  bool is_ambiguous = 9;
  string status_message = 10;
}

service IntentService {
  rpc ProcessIntentStream (
    finguard.ingress.ClientRequest
  ) returns (
    IntentPayload
  );
}