syntax = "proto3";

package finguard.policy;

// Import the adjacent domain structures
import "intent.proto"; 
import "risk.proto";

enum PolicyEffect {
  EFFECT_UNSPECIFIED = 0;
  ALLOW = 1;                  
  REQUIRE_CONFIRMATION = 2;   
  REQUIRE_APPROVAL = 3;       
  BLOCK = 4;                  
}

message PolicyDecision {
  PolicyEffect effect = 1;
  repeated string triggered_rules = 2; 
  repeated string user_facing_reasons = 3; 
  int64 challenge_ttl_seconds = 4; 
}

// ─── NEW ADDITIONS ───

// The unified request wrapper carrying both upstream scopes
message PolicyEvaluationRequest {
  finguard.intent.IntentPayload intent_payload = 1;
  finguard.risk.RiskProfile risk_profile = 2;
}

// The service definition exposing the execution gate
service PolicyService {
  rpc EvaluateTransactionPolicy (PolicyEvaluationRequest) returns (PolicyDecision);
}